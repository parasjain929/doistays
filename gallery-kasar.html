<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasar Photos – Doi Stays</title>
  <meta name="description" content="Browse all photos of Doi Stays Kasar - a Himalayan view 2BHK retreat near Kasar Devi, Almora, Uttarakhand.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="stylesheet" href="styles.css">
  <style>
    .gallery-page-header {
      padding: 120px 0 60px;
      text-align: center;
    }
    .gallery-page-header h1 {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 400;
      margin-bottom: 8px;
    }
    .gallery-page-header p {
      color: var(--color-text-light);
      font-size: 1rem;
    }
    .gallery-page-header .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: 24px;
      transition: color var(--transition);
    }
    .gallery-page-header .back:hover { color: var(--color-text); }
    .full-gallery {
      padding: 0 0 80px;
    }
    .full-gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .full-gallery-grid img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: 2px;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }
    .full-gallery-grid img:hover { opacity: 0.85; }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.92);
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 2px;
    }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }
    .lightbox-close:hover { color: #fff; }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 2.5rem;
      cursor: pointer;
      padding: 20px;
      line-height: 1;
      transition: color 0.2s;
    }
    .lightbox-nav:hover { color: #fff; }
    .lightbox-prev { left: 8px; }
    .lightbox-next { right: 8px; }
    .lightbox-counter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
    }

    @media (max-width: 768px) {
      .full-gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .lightbox { padding: 16px; }
      .lightbox-nav { font-size: 1.8rem; padding: 12px; }
    }
    @media (max-width: 480px) {
      .full-gallery-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <section class="gallery-page-header">
    <div class="container">
      <a href="kasar.html" class="back">&larr; Back to Kasar</a>
      <h1>Kasar &mdash; All Photos</h1>
      <p>Photos of the Himalayan view retreat near Kasar Devi, Almora</p>
    </div>
  </section>

  <section class="full-gallery">
    <div class="container">
      <div class="full-gallery-grid">
        <img src="https://a0.muscache.com/im/pictures/hosting/Hosting-1657061352546002101/original/9f8067c5-8eb2-4221-9ca2-d479cc8285e8.jpeg" alt="Kasar property view" loading="lazy">
        <img src="https://a0.muscache.com/im/pictures/hosting/Hosting-1657061352546002101/original/53abd783-c9e0-45c0-a8b1-0770b53d8055.jpeg" alt="Kasar exterior and surroundings" loading="lazy">
        <img src="https://a0.muscache.com/im/pictures/hosting/Hosting-1657061352546002101/original/de014472-3ff6-4726-94cb-a1b2edb1996d.jpeg" alt="Himalayan mountain views" loading="lazy">
        <img src="https://a0.muscache.com/im/pictures/hosting/Hosting-1657061352546002101/original/dd5f140c-13f4-4725-96bd-1ac2f8523c0b.jpeg" alt="Room interior" loading="lazy">
        <img src="https://a0.muscache.com/im/pictures/hosting/Hosting-1657061352546002101/original/a8183d47-d7a7-4e47-9889-2613e3cad5f0.jpeg" alt="Kitchen and living area" loading="lazy">
        <img src="https://a0.muscache.com/im/pictures/hosting/Hosting-1657061352546002101/original/3f49c7be-d3ac-41c5-9d49-74b95617b62a.jpeg" alt="Outdoor area" loading="lazy">
        <img src="https://a0.muscache.com/im/pictures/hosting/Hosting-1657061352546002101/original/6e865fb7-efaa-432e-84b9-40f2bbc6f0b0.jpeg" alt="Valley and nature views" loading="lazy">
        <img src="https://a0.muscache.com/im/pictures/hosting/Hosting-1657061352546002101/original/6ecc018f-bd3b-42d3-9602-4f6f047b452f.jpeg" alt="Property surroundings" loading="lazy">
      </div>
    </div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#8249;</button>
    <img src="" alt="" id="lightboxImg">
    <button class="lightbox-nav lightbox-next" id="lightboxNext">&#8250;</button>
    <div class="lightbox-counter" id="lightboxCounter"></div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">
          <p class="footer-logo"><img src="logo.svg" alt="Doi Stays" class="footer-logo-img">Doi Stays</p>
          <p class="footer-tagline">Boutique Mountain Retreats in Kumaon, Uttarakhand</p>
        </div>
        <div class="footer-links">
          <a href="index.html#properties">Stays</a>
          <a href="index.html#about">About</a>
          <a href="index.html#contact">Contact</a>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 Doi Stays. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script>
    // Lightbox
    const images = document.querySelectorAll('.full-gallery-grid img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxCounter = document.getElementById('lightboxCounter');
    let currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      lightboxImg.src = images[index].src;
      lightboxImg.alt = images[index].alt;
      lightboxCounter.textContent = (index + 1) + ' / ' + images.length;
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      currentIndex = (currentIndex + dir + images.length) % images.length;
      lightboxImg.src = images[currentIndex].src;
      lightboxImg.alt = images[currentIndex].alt;
      lightboxCounter.textContent = (currentIndex + 1) + ' / ' + images.length;
    }

    images.forEach((img, i) => img.addEventListener('click', () => openLightbox(i)));
    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    document.getElementById('lightboxPrev').addEventListener('click', () => navigate(-1));
    document.getElementById('lightboxNext').addEventListener('click', () => navigate(1));
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });
  </script>
</body>
</html>
