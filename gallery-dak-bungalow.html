  <style>
    .gallery-page-header {
      padding: 120px 0 60px;
      text-align: center;
    }
    .gallery-page-header h1 {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 400;
      margin-bottom: 8px;
    }
    .gallery-page-header p {
      color: var(--color-text-light);
      font-size: 1rem;
    }
    .gallery-page-header .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: 24px;
      transition: color var(--transition);
    }
    .gallery-page-header .back:hover { color: var(--color-text); }
    .full-gallery {
      padding: 0 0 80px;
    }
    .full-gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .full-gallery-grid img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: 2px;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }
    .full-gallery-grid img:hover { opacity: 0.85; }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.92);
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 2px;
    }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }
    .lightbox-close:hover { color: #fff; }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 2.5rem;
      cursor: pointer;
      padding: 20px;
      line-height: 1;
      transition: color 0.2s;
    }
    .lightbox-nav:hover { color: #fff; }
    .lightbox-prev { left: 8px; }
    .lightbox-next { right: 8px; }
    .lightbox-counter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
    }

    @media (max-width: 768px) {
      .full-gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .lightbox { padding: 16px; }
      .lightbox-nav { font-size: 1.8rem; padding: 12px; }
    }
    @media (max-width: 480px) {
      .full-gallery-grid { grid-template-columns: 1fr; }
    }
  </style>

  <script>
    // Lightbox
    const images = document.querySelectorAll('.full-gallery-grid img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxCounter = document.getElementById('lightboxCounter');
    let currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      lightboxImg.src = images[index].src;
      lightboxImg.alt = images[index].alt;
      lightboxCounter.textContent = (index + 1) + ' / ' + images.length;
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      currentIndex = (currentIndex + dir + images.length) % images.length;
      lightboxImg.src = images[currentIndex].src;
      lightboxImg.alt = images[currentIndex].alt;
      lightboxCounter.textContent = (currentIndex + 1) + ' / ' + images.length;
    }

    images.forEach((img, i) => img.addEventListener('click', () => openLightbox(i)));
    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    document.getElementById('lightboxPrev').addEventListener('click', () => navigate(-1));
    document.getElementById('lightboxNext').addEventListener('click', () => navigate(1));
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });
  </script>
